<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="稼動ツール">
<meta name="theme-color" content="#f5f4f0">
<title>稼動詳細テキスト生成ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#f5f4f0!important;color:#1a1a1a!important;color-scheme:light!important}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;min-height:100vh;padding:16px;padding-top:max(env(safe-area-inset-top),20px);padding-bottom:max(env(safe-area-inset-bottom),40px)}
@media(prefers-color-scheme:dark){html,body{background:#f5f4f0!important;color:#1a1a1a!important}}
.container{max-width:640px;margin:0 auto}
h1{font-size:18px;font-weight:700;color:#1a1a1a;line-height:1.3;margin-bottom:4px}
.subtitle{font-size:12px;color:#888;line-height:1.6;margin-bottom:20px}
.input-block{background:#fff;border:1px solid #e0dfd8;border-radius:14px;padding:14px;margin-bottom:12px;color-scheme:light}
.input-label{font-size:11px;font-weight:600;color:#888;letter-spacing:.05em;margin-bottom:6px}
.paste-area{width:100%;height:180px;padding:10px 12px;font-size:14px;border:1px solid #d0cfd8;border-radius:10px;background:#fafaf7;color:#1a1a1a;outline:none;-webkit-appearance:none;color-scheme:light;resize:none;line-height:1.6;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif}
.paste-area:focus{border-color:#555;background:#fff}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn{flex:1;height:48px;font-size:15px;font-weight:600;border-radius:10px;border:none;cursor:pointer;-webkit-appearance:none;color-scheme:light}
.btn:active{opacity:.75;transform:scale(.97)}
.btn.primary{background:#1a1a1a;color:#fff}
.btn.secondary{background:#ebe9e3;color:#444;flex:0 0 80px}
.msg{font-size:13px;min-height:16px;margin-bottom:10px;padding:0 2px}
.msg.err{color:#c0392b}
.msg.ok{color:#1a7a4a;font-weight:500}
.btn-all{width:100%;height:48px;font-size:14px;font-weight:600;background:#fff;color:#1a1a1a;border:1px solid #d0cfd8;border-radius:10px;cursor:pointer;-webkit-appearance:none;margin-bottom:10px;color-scheme:light}
.btn-all.copied{color:#1a7a4a;border-color:#1a7a4a;background:#f0faf5}
.results{display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:14px;overflow:hidden;color-scheme:light}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #ebe9e3;background:#fafaf7;gap:8px}
.card-title{font-size:14px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.card-title span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.area-badge{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:600;flex-shrink:0;white-space:nowrap}
.copy-btn{height:34px;padding:0 14px;font-size:13px;font-weight:600;border:1px solid #d0cfd8;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;flex-shrink:0;-webkit-appearance:none;white-space:nowrap}
.copy-btn:active{opacity:.65}
.copy-btn.copied{color:#1a7a4a;border-color:#1a7a4a;background:#f0faf5}
.text-out{padding:14px;font-size:13px;line-height:2;color:#1a1a1a;background:#fefefe;font-family:"Courier New",monospace;white-space:pre-wrap;word-break:break-all;-webkit-user-select:all;user-select:all}
.hint-box{text-align:center;padding:2rem 1rem;color:#bbb;font-size:13px;line-height:2;background:#fff;border:1px dashed #d0cfd8;border-radius:14px}
.hint-box strong{display:block;font-size:15px;color:#999;margin-bottom:6px;font-weight:700}
.hint-box .step{background:#f5f4f0;border-radius:10px;padding:10px 14px;text-align:left;margin-top:10px;font-size:13px;color:#888;line-height:2}
</style>
</head>
<body>
<div class="container">
  <h1>稼動詳細テキスト生成ツール</h1>
  <p class="subtitle">Slackのメッセージテキストを貼り付けるだけで自動解析します</p>
  <div class="input-block">
    <div class="input-label">SLACK メッセージのテキストをここに貼り付け</div>
    <textarea id="pasteArea" class="paste-area" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Slackのメッセージを長押し→「テキストをコピー」してここに貼り付け"></textarea>
    <div class="btn-row">
      <button class="btn primary" onclick="analyze()">解析してテキスト生成</button>
      <button class="btn secondary" onclick="clearAll()">クリア</button>
    </div>
  </div>
  <div class="msg" id="msg"></div>
  <div id="allCopyRow" style="display:none">
    <button class="btn-all" id="btnAll" onclick="copyAll()">全会場をまとめてコピー</button>
  </div>
  <div id="results" class="results"></div>
  <div id="hintBox" class="hint-box">
    <strong>使い方</strong>
    <div class="step">
      ① Slackでメッセージを<strong style="color:#555">長押し</strong><br>
      ②「テキストをコピー」をタップ<br>
      ③ 上のエリアに<strong style="color:#555">貼り付け</strong><br>
      ④「解析してテキスト生成」をタップ
    </div>
  </div>
</div>
<script>
var FORMS="▼前日夜フォーム\nhttps://docs.google.com/forms/d/e/1FAIpQLSfIUrdBHjkGLtTB5Hd-gsMCuMIWMI5_HjxPzbK8opfbDl9D2w/viewform\n\n▼当日朝フォーム\nhttps://docs.google.com/forms/d/e/1FAIpQLSekGwsk8KsT18tqLF3AJ_dKHYI4Wx55w0jsTlFAl5wQ-2fzlg/viewform";
var areaColor={"東京":{bg:"#dbeafe",text:"#1e40af"},"埼玉":{bg:"#dcfce7",text:"#166534"},"千葉":{bg:"#fef3c7",text:"#92400e"},"神奈川":{bg:"#ede9fe",text:"#5b21b6"},"清瀬":{bg:"#fce7f3",text:"#9d174d"},"横浜":{bg:"#ede9fe",text:"#5b21b6"},"群馬":{bg:"#ecfdf5",text:"#065f46"},"栃木":{bg:"#fff7ed",text:"#9a3412"},"茨城":{bg:"#f0fdf4",text:"#166534"}};
function makeText(d){return"【"+d.area+"エリア・"+d.store+"】\n●住所："+d.address+"\n●日程："+d.dates+"\n●イベントスペース："+d.space+"\n搬入から設営："+d.move+"となります。\nディレクター："+d.director+"（"+d.tel+"）\n\n"+FORMS;}
function parseVenues(text){
  var venues=[],lines=text.split(/\n/),currentArea="",i=0;
  while(i<lines.length){
    var line=lines[i].trim();
    var areaM=line.match(/([\u4e00-\u9fa5]{2,4})エリア/);
    if(areaM)currentArea=areaM[1];
    var storeM=line.match(/【([^】]+)】/);
    if(storeM){
      var store=storeM[1].trim(),blockLines=[line],j=i+1;
      while(j<lines.length&&!lines[j].match(/【[^】]+】/)&&!lines[j].match(/^[\u4e00-\u9fa5]{2,4}エリア/)){blockLines.push(lines[j]);j++;}
      var block=blockLines.join("\n");
      var addrM=block.match(/●?\s*住所[：:]\s*(.+)/);
      var address=addrM?addrM[1].trim():"";
      var dateLines=[];
      var allDateM=block.match(/●?\s*日程[：:]\s*(.+)/g);
      if(allDateM)allDateM.forEach(function(l){var v=l.replace(/●?\s*日程[：:]\s*/,"").trim();if(v)dateLines.push(v);});
      var dates=dateLines.join("\n");
      var spaceM=block.match(/●?\s*イベントスペース[：:]\s*(.+)/);
      var space=spaceM?spaceM[1].trim():"";
      var moveM=block.match(/搬入から設営[：:]\s*(.+?)(?:となります|。|$)/m);
      var move=moveM?moveM[1].trim():"";
      var dirM=block.match(/ディレクター[：:]\s*(?:ディレクター[：:]\s*)?([^\s（([\u4e00-\u9fa5\d\n]+?)\s*[（(]([0-9\-]+)[）)]/);
      var director="",tel="";
      if(dirM){director=dirM[1].trim();tel=dirM[2].trim();}
      if(store&&(address||dates))venues.push({area:currentArea||"不明",store:store,address:address,dates:dates,space:space,move:move,director:director,tel:tel});
      i=j;continue;
    }
    i++;
  }
  return venues;
}
var currentData=[];
function analyze(){
  var text=document.getElementById("pasteArea").value.trim();
  if(!text){setMsg("テキストを貼り付けてください","err");return;}
  var venues=parseVenues(text);
  if(!venues.length){setMsg("会場情報を読み取れませんでした。【店舗名】の形式が含まれているか確認してください","err");return;}
  currentData=venues;render(venues);
  setMsg(venues.length+"件の稼動を取得しました","ok");
  document.getElementById("hintBox").style.display="none";
  document.getElementById("allCopyRow").style.display="block";
}
function render(venues){
  var container=document.getElementById("results");container.innerHTML="";
  venues.forEach(function(d,i){
    var ac=areaColor[d.area]||{bg:"#f3f4f6",text:"#374151"};
    var card=document.createElement("div");card.className="card";
    var txt=makeText(d).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    card.innerHTML='<div class="card-head"><div class="card-title"><span class="area-badge" style="background:'+ac.bg+';color:'+ac.text+'">'+d.area+'</span><span>'+d.store+'</span></div><button class="copy-btn" id="cbtn'+i+'" onclick="copyOne('+i+')">コピー</button></div><div class="text-out">'+txt+'</div>';
    container.appendChild(card);
  });
}
function copyOne(i){navigator.clipboard.writeText(makeText(currentData[i])).then(function(){var b=document.getElementById("cbtn"+i);b.textContent="コピー完了！";b.classList.add("copied");setTimeout(function(){b.textContent="コピー";b.classList.remove("copied");},2000);});}
function copyAll(){var b=document.getElementById("btnAll");navigator.clipboard.writeText(currentData.map(makeText).join("\n\n")).then(function(){b.textContent="コピー完了！";b.classList.add("copied");setTimeout(function(){b.textContent="全会場をまとめてコピー";b.classList.remove("copied");},2000);});}
function clearAll(){document.getElementById("pasteArea").value="";currentData=[];document.getElementById("results").innerHTML="";document.getElementById("allCopyRow").style.display="none";document.getElementById("hintBox").style.display="block";setMsg("","");}
function setMsg(txt,type){var el=document.getElementById("msg");el.textContent=txt;el.className="msg"+(type?" "+type:"");}
</script>
</body>
</html>
